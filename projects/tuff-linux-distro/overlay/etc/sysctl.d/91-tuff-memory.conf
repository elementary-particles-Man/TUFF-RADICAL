# TUFF-RADICAL: Memory & CPU Minimum Footprint (Google Tuned)

# Page Cluster: Disable read-ahead for swap/ZRAM. 
# ZRAM compresses pages individually; reading ahead wastes CPU and Memory.
vm.page-cluster = 0

# Watermark Scale Factor: Proactively reclaim memory before it becomes an emergency.
# Helps MGLRU perform smooth, background evictions without CPU spikes.
vm.watermark_scale_factor = 125
vm.watermark_boost_factor = 0

# Stat interval: Reduce VM stat update frequency to save CPU cycles
vm.stat_interval = 10
vm.compaction_proactiveness = 0
