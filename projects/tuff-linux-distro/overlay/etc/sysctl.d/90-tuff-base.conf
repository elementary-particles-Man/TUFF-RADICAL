# TUFF-RADICAL: T-RAD Intel/Performance Domain

# VM Tuning: Aggressive cache utilization, optimized for modern high-speed NVMe and RAM
vm.swappiness = 10
vm.vfs_cache_pressure = 50
vm.dirty_ratio = 60
vm.dirty_background_ratio = 2
vm.mmap_min_addr = 65536
vm.overcommit_memory = 1

# Network Tuning: BBR congestion control + FQ-PIE for low latency high throughput
net.core.default_qdisc = fq_pie
net.ipv4.tcp_congestion_control = bbr
net.core.somaxconn = 8192
net.ipv4.tcp_fastopen = 3
net.ipv4.tcp_rmem = 4096 1048576 4194304
net.ipv4.tcp_wmem = 4096 65536 4194304

# Kernel/CPU Tuning: Minimum overhead, maximize raw throughput
kernel.sysrq = 1
kernel.printk = 3 4 1 3
kernel.nmi_watchdog = 0
kernel.unprivileged_bpf_disabled = 1
kernel.kptr_restrict = 2
kernel.perf_event_paranoid = 1
