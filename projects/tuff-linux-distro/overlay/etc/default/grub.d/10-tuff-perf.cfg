# TUFF-RADICAL: T-RAD Base Kernel Parameters
# Extreme performance and latency minimization

# 1. Disable CPU mitigations for raw throughput
# 2. Force PCIe ASPM to performance mode (zero latency)
# 3. Enable Threaded IRQs for better responsiveness in async tasks
# 4. Expedite RCU grace periods for extreme boot speed
# 5. Disable NMI Watchdog to remove hardware interrupt overhead
# 6. Force NVMe to avoid deep sleep states (ps_max_latency_us=0)

GRUB_CMDLINE_LINUX_DEFAULT="${GRUB_CMDLINE_LINUX_DEFAULT} mitigations=off pcie_aspm=off threadirqs nowatchdog rcupdate.rcu_expedited=1 tsc=reliable nvme_core.default_ps_max_latency_us=0 amd_pstate=active transparent_hugepage=madvise zswap.enabled=0 cgroup_disable=rdma,misc page_alloc.shuffle=1 pci=noaer random.trust_cpu=on"
