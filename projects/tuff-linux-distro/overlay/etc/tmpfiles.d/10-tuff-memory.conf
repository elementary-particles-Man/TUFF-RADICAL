# TUFF-RADICAL: Google MGLRU & Extreme Memory Efficiency
# Enable Multi-Gen LRU (MGLRU) - Google's advanced memory management
# 7 = Enable all features (clearing, swappiness, etc.)
w /sys/kernel/mm/lru_gen/enabled - - - - 7
w /sys/kernel/mm/lru_gen/min_ttl_ms - - - - 1000

# Set Transparent HugePages (THP) to 'madvise' to prevent memory bloat/fragmentation
w /sys/kernel/mm/transparent_hugepage/enabled - - - - madvise
w /sys/kernel/mm/transparent_hugepage/shmem_enabled - - - - advise
w /sys/kernel/mm/transparent_hugepage/defrag - - - - defer+madvise
