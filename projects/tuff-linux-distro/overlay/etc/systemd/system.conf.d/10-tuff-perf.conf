[Manager]
# TUFF-RADICAL: Asynchronous Boot & Extreme Scalability

# Aggressive parallelization and service execution times
DefaultTimeoutStartSec=15s
DefaultTimeoutStopSec=10s
DefaultTasksMax=infinity

# System-wide unbounded resource limits for multi-process scalability
DefaultLimitNOFILE=1048576
DefaultLimitNPROC=1048576
DefaultLimitCORE=0

# Allow systemd to schedule boot processes faster and minimize overhead
TimerSlackNSec=50000
