# TUFF-RADICAL: Extreme Boot Speed
# Use zstd for initramfs compression (fast decompression, high ratio)
COMPRESS=zstd

# Only include strictly necessary modules for the current hardware (reduces size and boot time)
# Note: In a generic distro you might use 'most', but for T-RAD targeted at specific hw or VMs, 'dep' is faster.
# However, to maintain portability while keeping it fast, we will keep it as 'most' but force zstd level.
# Actually, for an ultimate tune, let's force zstd compression level.
COMPRESSLEVEL=19
